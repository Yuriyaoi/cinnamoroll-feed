<div style="text-align: center; font-family: 'Courier New', Courier, monospace;">
    <h1 style="color: #87CEEB;">Cinnamoroll Care Sim</h1>
    
    <img id="cinnamoroll-img" src="cinnamoroll_thin.png" alt="Cinnamoroll" style="width: 200px; transition: width 0.3s ease;">
    
    <h2 style="color: #FFB6C1;">Care Points: <span id="score">0</span></h2>
    <p id="status-text" style="color: #555;">กำลังหิวโหย...</p>

    <button onclick="feedCinnamoroll()" style="background-color: white; border: 2px solid #87CEEB; border-radius: 20px; padding: 10px 20px; cursor: pointer; font-size: 16px;">
        ป้อนขนมให้น้อง 🧁
    </button>
</div>

<script>
    let score = 0; // ตัวแปรเก็บคะแนน เริ่มที่ 0

    // ส่วน Logic (Process)
    function feedCinnamoroll() {
        score = score + 1; // บวกเพิ่มทีละหนึ่ง
        document.getElementById("score").innerText = score; // โชว์คะแนนใหม่

        let img = document.getElementById("cinnamoroll-img");
        let status = document.getElementById("status-text");

        // 🧠 นี่คือ Logic Range (0-50, 51-80, 81+)
        if (score <= 30) {
            // State: ผอมโซ
            img.src = "cinnamoroll_thin.png"; 
            img.style.width = "250px";
            status.innerText = "กำลังหิวโหย...";
        } else if (score <= 80) {
            // State: เริ่มมีกิน
            img.src = "cinnamoroll_normal.png"; 
            img.style.width = "300px"; // ขยายขนาดนิดหน่อย
            status.innerText = "เริ่มมีแก้มแล้ว!";
        } else {
            // State: SUPER FAT (เวอร์ชันพุงป่องอิ่มจนเดินไม่ไหว!)
            img.src = "cinnamoroll_super_fat.png"; 
            img.style.width = "400px"; // ขยายร่างใหญ่สุดๆ
            status.innerText = "อิ่มจนพุงกาง เดินไม่ไหวแล้ว!! (Super Fat)";
        }
    }
</script>
